notes_dir = "~/Library/Mobile Documents/com~apple~CloudDocs/ekphos"
welcome_shown = false
theme = "catppuccin-mocha"
show_empty_dir = true
syntax_theme = "base16-ocean.dark"
sidebar_collapsed = false
outline_collapsed = false
folders_first = true
frontmatter_hidden = true
show_tags = true
check_updates = false
transparent_bg = false
floating_cursor = false
journal_folder = "journal"

# Template picker toggles (Alt+N); the 't' daily journal keybinding is unaffected
daily_notes_enabled = false
weekly_notes_enabled = true
monthly_notes_enabled = true

[editor]
line_wrap = true
tab_width = 4
left_padding = 0
right_padding = 1
line_numbers = "absolute"
scrolloff = 0
