onboarding = false

[update]
channel = "stable"
version_check = true
manifest_check = true

[terminal]
default_shell = "fish"
shell_mode = "auto"
new_cwd = "follow"

[keys]
prefix = "ctrl+b"
switch_tab = "prefix+1..9"
switch_workspace = "prefix+shift+1..9"
focus_agent = "prefix+alt+1..9"

[[keys.command]]
key = "prefix+ctrl+g"
type = "pane"
command = "gitui"
description = "run gitui"

[theme]
name = "catppuccin"
auto_switch = false

[ui]
sidebar_width = 26
sidebar_collapsed_mode = "compact"
mouse_capture = true
confirm_close = true
pane_borders = true
pane_gaps = true
hide_tab_bar_when_single_tab = true
accent = "cyan"
show_agent_labels_on_pane_borders = true
prompt_new_tab_name = true

[ui.toast]
delivery = "herdr"

[ui.toast.herdr]
position = "bottom-left"

[ui.sound]
enabled = true

[advanced]
scrollback_limit_bytes = 10485760

[session]
resume_agents_on_restore = true

[experimental]
kitty_graphics = true
